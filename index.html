<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TONE ART- Wreath Lab</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400&family=Gowun+Dodum&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:    #E36E28;
      --orange-d:  #C45A18;
      --orange-lt: #FEF1E6;
      --ivory:     #FAF7F2;
      --ivory-d:   #F3EDE3;
      --border:    #E6DAD0;
      --border-lt: #EFE8DF;
      --txt:       #251C12;
      --txt-mid:   #7A6A58;
      --txt-lt:    #B3A494;
      --white:     #FFFFFF;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-weight: 400;
      background: var(--ivory);
      color: var(--txt);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #hdr {
      height: 52px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 18px;
      flex-shrink: 0;
    }
    .logo-wrap { display: flex; align-items: baseline; gap: 8px; flex: 1; }
    .logo { font-size: 16px; font-weight: 700; color: var(--orange); letter-spacing: -0.2px; }
    .logo-sub { font-size: 11px; color: var(--txt-lt); }

    #ig-link {
      display: flex; align-items: center; gap: 6px;
      color: var(--txt-mid); text-decoration: none;
      padding: 6px 10px; border-radius: 8px;
      font-size: 11px; font-weight: 500;
      transition: color .15s, background .15s;
    }
    #ig-link:hover { color: var(--orange); background: var(--orange-lt); }

    /* ── Layout ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Left panel ── */
    #left {
      width: 240px;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .ph {
      padding: 10px 12px 8px;
      font-size: 9.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--txt-lt);
      border-bottom: 1px solid var(--border-lt);
      flex-shrink: 0;
    }

    /* ── Search bar ── */
    .search-wrap {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-lt);
      flex-shrink: 0;
    }
    .search-inner {
      display: flex;
      align-items: center;
      background: var(--ivory);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 9px;
      transition: border-color .15s, background .15s;
    }
    .search-inner:focus-within {
      border-color: var(--orange);
      background: var(--white);
    }
    .search-icon {
      color: var(--txt-lt);
      font-size: 13px;
      flex-shrink: 0;
      margin-right: 6px;
    }
    #flower-search {
      width: 100%;
      padding: 7px 0;
      border: none;
      outline: none;
      font-size: 12px;
      background: transparent;
      color: var(--txt);
      font-family: 'Pretendard', sans-serif;
    }
    #flower-search::placeholder { color: var(--txt-lt); }

    /* ── Palette ── */
    #palette {
      flex: 1; overflow-y: auto;
      padding: 4px 6px 12px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    /* ── Category sections ── */
    .cat-sec { margin-bottom: 2px; }

    .cat-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 6px 7px;
      cursor: pointer;
      border-radius: 7px;
      transition: background .12s;
      user-select: none;
    }
    .cat-hdr:hover { background: var(--ivory-d); }

    .cat-ttl {
      font-size: 12px;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: -0.1px;
    }
    .cat-en {
      font-size: 10.5px;
      font-weight: 400;
      color: var(--txt-lt);
      margin-left: 5px;
    }
    .cat-arrow {
      font-size: 11px;
      color: var(--txt-mid);
      transition: transform .22s ease;
      display: inline-block;
      flex-shrink: 0;
    }
    .cat-sec.open .cat-arrow { transform: rotate(180deg); }

    .cat-body {
      display: none;
      padding-bottom: 4px;
    }
    .cat-sec.open .cat-body { display: block; }

    /* Search empty state */
    .no-result {
      display: none;
      text-align: center;
      color: var(--txt-lt);
      font-size: 11.5px;
      padding: 20px 0 10px;
    }

    /* ── Flower grid ── */
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 3px;
    }
    .fi {
      cursor: pointer;
      border-radius: 7px;
      border: 2px solid transparent;
      height: 72px;
      overflow: hidden;
      transition: border-color .15s;
      background: var(--ivory);
    }
    .fi:hover { border-color: var(--orange); }
    .fi:active { transform: scale(.96); }
    .fi img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      padding: 4px;
    }

    /* ── Center ── */
    #center {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(150deg, var(--ivory-d) 0%, #EAE0D5 100%);
      overflow: hidden;
    }
    #canvas-wrap { position: relative; flex-shrink: 0; }

    #canvas {
      position: relative;
      width: min(373px, calc((100vw - 240px - 210px - 28px) * 0.9), calc((100vh - 52px - 28px) * 0.9));
      aspect-ratio: 1;
      background: transparent;
      border-radius: 16px;
      box-shadow: 0 16px 56px rgba(60,35,15,.18);
      overflow: hidden;
      display: block;
    }

    #wreath-base {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 92%; height: 92%;
      object-fit: contain;
      pointer-events: none; user-select: none;
      z-index: 1;
    }

    /* ── Handles overlay ── */
    #hl {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 100;
      overflow: visible; border-radius: 16px;
    }
    .hdl { position: absolute; pointer-events: all; transform: translate(-50%,-50%); }
    .hdl-res {
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--white); border: 2.5px solid var(--orange);
      box-shadow: 0 1px 6px rgba(227,110,40,.35);
      cursor: pointer; transition: transform .1s, background .1s;
    }
    .hdl-res:hover { transform: translate(-50%,-50%) scale(1.3); background: var(--orange-lt); }
    .hdl-rot {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--orange); color: var(--white);
      font-size: 13px; line-height: 24px; text-align: center;
      cursor: grab; box-shadow: 0 2px 10px rgba(227,110,40,.45);
      transition: transform .1s, background .1s; user-select: none;
    }
    .hdl-rot:hover  { transform: translate(-50%,-50%) scale(1.18); background: var(--orange-d); }
    .hdl-rot:active { cursor: grabbing; }

    /* ── Canvas elements ── */
    .cel {
      position: absolute; cursor: grab;
      user-select: none; z-index: 2;
      transform-origin: center center; touch-action: none;
    }
    .cel:active { cursor: grabbing; }
    .cel.flower img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }
    .cel.txt { white-space: pre; line-height: 1.25; }

    /* ── Layers panel ── */
    #layers-list {
      max-height: 190px;
      overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    #layers-empty {
      font-size: 11px; color: var(--txt-lt);
      text-align: center; padding: 10px 0 4px;
      line-height: 1.6;
    }
    .layer-item {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 5px; border-radius: 7px;
      cursor: pointer; margin-bottom: 2px;
      transition: background .12s;
      border: 1.5px solid transparent;
    }
    .layer-item:hover { background: var(--ivory-d); }
    .layer-item.active {
      background: var(--orange-lt);
      border-color: var(--orange);
    }
    .layer-thumb {
      width: 30px; height: 30px; border-radius: 5px;
      background: var(--ivory); border: 1px solid var(--border-lt);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .layer-thumb img { width: 100%; height: 100%; object-fit: contain; }
    .layer-thumb-txt {
      font-size: 13px; font-weight: 700; color: var(--txt-mid);
    }
    .layer-name {
      flex: 1; font-size: 11px; color: var(--txt);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .layer-btns { display: flex; flex-direction: column; gap: 2px; }
    .layer-btn {
      width: 20px; height: 17px;
      background: var(--ivory-d); border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      color: var(--txt-mid); transition: background .1s, color .1s;
      padding: 0;
    }
    .layer-btn:hover { background: var(--orange-lt); color: var(--orange); border-color: var(--orange); }
    .layer-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    /* ── Right panel ── */
    #right-wrap {
      width: 210px;
      border-left: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #right {
      background: var(--white);
      display: flex; flex-direction: column;
      overflow-y: auto; flex: 1;
    }
    .scroll-hint {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: linear-gradient(transparent, rgba(255,255,255,0.96) 65%);
      pointer-events: none;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 7px;
      font-size: 11px; color: var(--txt-lt);
      letter-spacing: 0.3px;
      transition: opacity 0.25s;
      z-index: 5;
    }
    .sec { padding: 13px 14px; border-bottom: 1px solid var(--border-lt); }
    .st {
      font-size: 9.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--txt-lt); margin-bottom: 11px;
    }

    .cr { margin-bottom: 9px; }
    .cl { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--txt-mid); margin-bottom: 4px; }
    .cv { font-weight: 700; color: var(--orange); }
    input[type=range] { width: 100%; accent-color: var(--orange); cursor: pointer; }

    #no-sel { font-size: 11.5px; color: var(--txt-lt); text-align: center; padding: 2px 0 4px; }
    #sel-ctrls { display: none; }

    /* BG swatches */
    .sg { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; margin-bottom: 10px; }
    .sw {
      width: 100%; aspect-ratio: 1; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent; transition: transform .1s;
    }
    .sw:hover { transform: scale(1.18); }
    .sw.act { border-color: var(--orange); }
    .sw-clear {
      background-image:
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 6px 6px;
      background-position: 0 0, 0 3px, 3px -3px, -3px 0;
      background-color: #fff;
    }
    .cr-row { display: flex; align-items: center; gap: 8px; }
    .cr-row label { font-size: 11.5px; color: var(--txt-mid); }
    input[type=color] { width: 30px; height: 26px; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; padding: 2px; }

    /* Text tool */
    #txt-in {
      width: 100%; padding: 7px 10px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: 13px; outline: none; color: var(--txt);
      margin-bottom: 8px; font-family: 'Pretendard', sans-serif;
      background: var(--ivory); transition: border-color .15s;
    }
    #txt-in:focus { border-color: var(--orange); background: var(--white); }
    .r2 { display: flex; gap: 7px; margin-bottom: 8px; align-items: center; }
    #fnt-sel { flex: 1; padding: 5px 7px; border: 1px solid var(--border); border-radius: 6px; font-size: 11.5px; background: var(--ivory); color: var(--txt); }

    /* Buttons */
    .btn {
      width: 100%; padding: 9px 14px; border: none; border-radius: 8px;
      font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all .15s;
      margin-bottom: 7px; font-family: 'Pretendard', sans-serif;
      display: block; text-align: center; letter-spacing: 0.1px;
    }
    .btn:last-child { margin-bottom: 0; }
    .bp { background: var(--orange); color: var(--white); }
    .bp:hover { background: var(--orange-d); }
    .bs { background: var(--ivory); color: var(--orange); border: 1.5px solid var(--orange); }
    .bs:hover { background: var(--orange-lt); }
    .bq { background: var(--ivory-d); color: var(--txt-mid); border: 1px solid var(--border); }
    .bq:hover { background: #E8DDD0; color: var(--txt); }

    .tips { font-size: 11px; color: var(--txt-lt); line-height: 1.85; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div id="hdr">
  <div class="logo-wrap">
    <span class="logo">TONE ART- Wreath Lab</span>
    <span class="logo-sub">레터링 플라워 리스 디자인</span>
  </div>
  <a id="ig-link" href="https://www.instagram.com/tone_art/" target="_blank" rel="noopener" title="@tone_art on Instagram">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4.5"/>
      <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
    </svg>
    <span>@tone_art</span>
  </a>
</div>

<div id="main">

  <aside id="left">
    <div class="ph">꽃 소재</div>
    <div class="search-wrap">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input type="text" id="flower-search" placeholder="꽃 검색 · Search">
      </div>
    </div>
    <div id="palette">
      <div class="no-result" id="no-result">검색 결과가 없습니다</div>
    </div>
  </aside>

  <div id="center">
    <div id="canvas-wrap">
      <div id="canvas">
        <img id="wreath-base" src="flower image/wreath.png" alt="리스 틀">
      </div>
      <div id="hl"></div>
    </div>
  </div>

  <div id="right-wrap">
  <aside id="right">

    <div class="sec">
      <div class="st">선택한 소재</div>
      <div id="no-sel">소재를 클릭해 선택하세요</div>
      <div id="sel-ctrls">
        <div class="cr">
          <div class="cl"><span>크기</span><span class="cv" id="sz-val">100%</span></div>
          <input type="range" id="sz-sl" min="10" max="300" value="100" step="5">
        </div>
        <div class="cr">
          <div class="cl"><span>회전</span><span class="cv" id="rot-val">0°</span></div>
          <input type="range" id="rot-sl" min="0" max="360" value="0">
        </div>
        <button class="btn bq" id="del-btn">선택 삭제</button>
      </div>
    </div>

    <div class="sec">
      <div class="st">배경 색상</div>
      <div class="sg" id="sw-grid"></div>
      <div class="cr-row">
        <label for="bg-c">직접 선택</label>
        <input type="color" id="bg-c" value="#ffffff">
      </div>
    </div>

    <div class="sec">
      <div class="st">레터링 텍스트</div>
      <input type="text" id="txt-in" placeholder="텍스트 입력">
      <div class="r2">
        <select id="fnt-sel">
          <option value="'Pretendard',sans-serif">Pretendard</option>
          <option value="'Noto Serif KR',serif">명조체</option>
          <option value="'Gowun Dodum',sans-serif">도담체</option>
          <option value="Georgia,serif">Georgia</option>
          <option value="cursive">필기체</option>
        </select>
        <input type="color" id="txt-col" value="#251c12" title="글자 색상">
      </div>
      <div class="cr">
        <div class="cl"><span>글자 크기</span><span class="cv" id="tsz-val">24px</span></div>
        <input type="range" id="tsz-sl" min="10" max="100" value="24" step="2">
      </div>
      <button class="btn bs" id="add-txt-btn">텍스트 추가</button>
    </div>

    <div class="sec">
      <div class="st">레이어</div>
      <div id="layers-empty">캔버스에 소재를 추가하면<br>레이어가 생성됩니다</div>
      <div id="layers-list"></div>
    </div>

    <div class="sec">
      <div class="st">사용 방법</div>
      <div class="tips">
        1. 왼쪽 소재 클릭으로 추가<br>
        2. 캔버스에서 드래그로 배치<br>
        3. 모서리 핸들로 크기 조절<br>
        4. 상단 원 핸들로 회전<br>
        5. PNG 저장 (워터마크 포함)
      </div>
    </div>

    <div class="sec">
      <div class="st">저장 / 공유</div>
      <button class="btn bp" id="save-btn">PNG로 저장</button>
      <button class="btn bs" id="share-btn">공유하기</button>
      <button class="btn bq" id="reset-btn">전체 초기화</button>
    </div>

  </aside>
  <div class="scroll-hint" id="scroll-hint">▼ 스크롤</div>
  </div>
</div>

/* ── Build palette ───────────────────────────────────── */

GROUPS.forEach((group, gi) => {
  const sec = document.createElement('div');
  sec.className = 'cat-sec' + (gi === 0 ? ' open' : '');

  const hdr = document.createElement('div');
  hdr.className = 'cat-hdr';
  hdr.innerHTML = `<span class="cat-ttl">${group.label}<span class="cat-en">(${group.en})</span></span><span class="cat-arrow">▼</span>`;
  hdr.addEventListener('click', () => sec.classList.toggle('open'));
  sec.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'cat-body';

  const grid = document.createElement('div');
  grid.className = 'cat-grid';

  group.items.forEach(f => {
    const d = document.createElement('div');
    d.className = 'fi';
    d.title = f.name + ' · ' + f.en;
    d.dataset.name = f.name;
    d.dataset.en = f.en;
    const img = document.createElement('img');
    img.src = f.src; img.alt = f.name; img.loading = 'lazy';
    d.appendChild(img);
    d.addEventListener('click', () => addFlower(f.src, f.name));
    grid.appendChild(d);
  });

  body.appendChild(grid);
  sec.appendChild(body);
  pal.appendChild(sec);
});

/* ── Search ──────────────────────────────────────────── */
document.getElementById('flower-search').addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();

  if (!q) {
    document.querySelectorAll('.cat-sec').forEach((sec, i) => {
      sec.style.display = '';
      sec.querySelectorAll('.fi').forEach(fi => fi.style.display = '');
      sec.classList.toggle('open', i === 0);
    });
    noResult.style.display = 'none';
    return;
  }

  let anyMatch = false;
  document.querySelectorAll('.cat-sec').forEach(sec => {
    let hasMatch = false;
    sec.querySelectorAll('.fi').forEach(fi => {
      const match = fi.dataset.name.toLowerCase().includes(q) || fi.dataset.en.toLowerCase().includes(q);
      fi.style.display = match ? '' : 'none';
      if (match) hasMatch = true;
    });
    sec.style.display = hasMatch ? '' : 'none';
    if (hasMatch) { sec.classList.add('open'); anyMatch = true; }
  });
  noResult.style.display = anyMatch ? 'none' : 'block';
});

/* ── Add flower ──────────────────────────────────────── */
function addFlower(src, name) {
  const BASE = 120;
  const jit  = () => (Math.random() - .5) * 44;
  const el   = document.createElement('div');
  el.className = 'cel flower';
  el.style.cssText = `
    left:${canvas.offsetWidth  / 2 - BASE / 2 + jit()}px;
    top: ${canvas.offsetHeight / 2 - BASE / 2 + jit()}px;
    width:${BASE}px; height:${BASE}px;
  `;
  el.dataset.base   = BASE;
  el.dataset.scale  = 100;
  el.dataset.rotate = 0;
  const img = document.createElement('img');
  img.src = src; img.alt = name;
  el.appendChild(img);
  canvas.appendChild(el);
  attach(el);
  pick(el);
  renderLayers();
}

/* ── Element geometry ────────────────────────────────── */
function getElInfo(el) {
  const left = parseFloat(el.style.left) || 0;
  const top  = parseFloat(el.style.top)  || 0;
  const w    = el.offsetWidth;
  const h    = el.offsetHeight;
  const rot  = (parseFloat(el.dataset.rotate) || 0) * Math.PI / 180;
  return { left, top, w, h, cx: left + w / 2, cy: top + h / 2, rot };
}

/* ── Handle overlay ──────────────────────────────────── */
function updateHandles() {
  hl.innerHTML = '';
  if (!sel) return;
  const { w, h, cx, cy, rot } = getElInfo(sel);
  if (!w || !h) return;
  const cosR = Math.cos(rot), sinR = Math.sin(rot);
  function P(lx, ly) { return { x: cx + lx*cosR - ly*sinR, y: cy + lx*sinR + ly*cosR }; }

  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
  const corners = [P(-w/2,-h/2), P(w/2,-h/2), P(w/2,h/2), P(-w/2,h/2)];
  const poly = document.createElementNS(ns, 'polygon');
  poly.setAttribute('points', corners.map(p => `${p.x},${p.y}`).join(' '));
  poly.setAttribute('fill', 'none'); poly.setAttribute('stroke', '#E36E28');
  poly.setAttribute('stroke-width', '1.5'); poly.setAttribute('stroke-dasharray', '6 3');
  svg.appendChild(poly);
  const ROT_DIST = 32;
  const tc = P(0, -h/2), rp = P(0, -h/2 - ROT_DIST);
  const ln = document.createElementNS(ns, 'line');
  ['x1','y1','x2','y2'].forEach((a,i) => ln.setAttribute(a, [tc.x,tc.y,rp.x,rp.y][i]));
  ln.setAttribute('stroke','#E36E28'); ln.setAttribute('stroke-width','1.5');
  svg.appendChild(ln);
  hl.appendChild(svg);

  [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]].forEach(([lx,ly]) => {
    const p = P(lx, ly);
    const hd = document.createElement('div');
    hd.className = 'hdl hdl-res'; hd.title = '크기 조절';
    hd.style.left = p.x+'px'; hd.style.top = p.y+'px';
    hd.addEventListener('mousedown', e => { e.stopPropagation(); resizeStart(e.clientX, e.clientY, sel, 'mouse'); });
    hd.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); resizeStart(e.touches[0].clientX, e.touches[0].clientY, sel, 'touch'); }, { passive: false });
    hl.appendChild(hd);
  });

  const rh = document.createElement('div');
  rh.className = 'hdl hdl-rot'; rh.title = '회전'; rh.textContent = '↻';
  rh.style.left = rp.x+'px'; rh.style.top = rp.y+'px';
  rh.addEventListener('mousedown', e => { e.stopPropagation(); rotateStart(e.clientX, e.clientY, sel, 'mouse'); });
  rh.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); rotateStart(e.touches[0].clientX, e.touches[0].clientY, sel, 'touch'); }, { passive: false });
  hl.appendChild(rh);
}

/* ── Resize ──────────────────────────────────────────── */
function resizeStart(startX, startY, el, type) {
  const cr = canvas.getBoundingClientRect();
  const { cx: cx0, cy: cy0 } = getElInfo(el);
  const isFlower = el.classList.contains('flower');
  const initSize = isFlower ? el.offsetWidth : (parseFloat(el.style.fontSize) || parseFloat(el.dataset.base));
  const initDist = Math.hypot(startX - cr.left - cx0, startY - cr.top - cy0);
  if (initDist < 1) return;
  function step(cx, cy) {
    const newSize = Math.max(20, initSize * Math.hypot(cx - cr.left - cx0, cy - cr.top - cy0) / initDist);
    if (isFlower) {
      el.style.left = (cx0 - newSize/2)+'px'; el.style.top = (cy0 - newSize/2)+'px';
      el.style.width = newSize+'px'; el.style.height = newSize+'px';
    } else { el.style.fontSize = newSize+'px'; }
    el.dataset.scale = Math.round(newSize / parseFloat(el.dataset.base) * 100);
    szSl.value = Math.min(300, Math.max(10, +el.dataset.scale));
    szVal.textContent = el.dataset.scale + '%';
    updateHandles();
  }
  if (type === 'mouse') {
    const mm = e => step(e.clientX, e.clientY), mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
    document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
  } else {
    const tm = e => { e.preventDefault(); step(e.touches[0].clientX, e.touches[0].clientY); }, te = () => { document.removeEventListener('touchmove', tm); document.removeEventListener('touchend', te); };
    document.addEventListener('touchmove', tm, { passive: false }); document.addEventListener('touchend', te);
  }
}

/* ── Rotate ──────────────────────────────────────────── */
function rotateStart(startX, startY, el, type) {
  const cr = canvas.getBoundingClientRect();
  const { cx, cy } = getElInfo(el);
  const startAngle = Math.atan2(startY - cr.top - cy, startX - cr.left - cx) * 180 / Math.PI;
  const initRot = parseFloat(el.dataset.rotate) || 0;
  function step(cx2, cy2) {
    const angle = Math.atan2(cy2 - cr.top - cy, cx2 - cr.left - cx) * 180 / Math.PI;
    const newRot = ((initRot + angle - startAngle) % 360 + 360) % 360;
    el.dataset.rotate = Math.round(newRot);
    el.style.transform = `rotate(${newRot}deg)`;
    rotSl.value = Math.round(newRot); rotVal.textContent = Math.round(newRot) + '°';
    updateHandles();
  }
  if (type === 'mouse') {
    const mm = e => step(e.clientX, e.clientY), mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
    document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
  } else {
    const tm = e => { e.preventDefault(); step(e.touches[0].clientX, e.touches[0].clientY); }, te = () => { document.removeEventListener('touchmove', tm); document.removeEventListener('touchend', te); };
    document.addEventListener('touchmove', tm, { passive: false }); document.addEventListener('touchend', te);
  }
}

/* ── Drag ────────────────────────────────────────────── */
function attach(el) {
  function sd(cx, cy) { pick(el); return { cx, cy, l0: parseFloat(el.style.left)||0, t0: parseFloat(el.style.top)||0 }; }
  function md(st, cx, cy) { el.style.left = st.l0+(cx-st.cx)+'px'; el.style.top = st.t0+(cy-st.cy)+'px'; updateHandles(); }
  el.addEventListener('mousedown', e => {
    e.preventDefault(); const st = sd(e.clientX, e.clientY);
    const mv = e => md(st, e.clientX, e.clientY);
    const up = () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
  });
  el.addEventListener('touchstart', e => {
    e.preventDefault(); const t = e.touches[0]; const st = sd(t.clientX, t.clientY);
    const mv = e => { const t = e.touches[0]; md(st, t.clientX, t.clientY); };
    const up = () => { el.removeEventListener('touchmove', mv); el.removeEventListener('touchend', up); };
    el.addEventListener('touchmove', mv, { passive: false }); el.addEventListener('touchend', up);
  }, { passive: false });
}

/* ── Select / deselect ───────────────────────────────── */
function pick(el) {
  if (sel && sel !== el) sel.classList.remove('sel');
  sel = el; el.classList.add('sel'); el.style.zIndex = ++zTop;
  noSel.style.display = 'none'; selCtrls.style.display = 'block';
  szSl.value = Math.min(300, Math.max(10, +el.dataset.scale));
  rotSl.value = el.dataset.rotate;
  szVal.textContent = el.dataset.scale + '%';
  rotVal.textContent = el.dataset.rotate + '°';
  updateHandles();
  renderLayers();
}
function deselect() {
  if (sel) { sel.classList.remove('sel'); sel = null; }
  noSel.style.display = 'block'; selCtrls.style.display = 'none'; hl.innerHTML = '';
}
canvas.addEventListener('mousedown', e => { if (e.target === canvas || e.target.id === 'wreath-base') deselect(); });

/* ── Slider apply ────────────────────────────────────── */
function applyTransform(el) {
  const s = el.dataset.scale / 100, b = parseFloat(el.dataset.base), r = el.dataset.rotate;
  if (el.classList.contains('flower')) {
    const sz = b * s, oldW = el.offsetWidth, oldH = el.offsetHeight;
    const left = parseFloat(el.style.left)||0, top = parseFloat(el.style.top)||0;
    el.style.left = (left + oldW/2 - sz/2)+'px'; el.style.top = (top + oldH/2 - sz/2)+'px';
    el.style.width = sz+'px'; el.style.height = sz+'px';
  } else { el.style.fontSize = (b * s)+'px'; }
  el.style.transform = `rotate(${r}deg)`;
  updateHandles();
}
szSl.addEventListener('input', function () { if (!sel) return; sel.dataset.scale = this.value; szVal.textContent = this.value+'%'; applyTransform(sel); });
rotSl.addEventListener('input', function () { if (!sel) return; sel.dataset.rotate = this.value; rotVal.textContent = this.value+'°'; applyTransform(sel); });

/* ── Layers panel ────────────────────────────────────── */
function renderLayers() {
  const list  = document.getElementById('layers-list');
  const empty = document.getElementById('layers-empty');
  const elements = [...canvas.querySelectorAll('.cel')];

  if (elements.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Sort descending by z-index: top of list = frontmost
  elements.sort((a, b) => (+b.style.zIndex || 0) - (+a.style.zIndex || 0));

  list.innerHTML = '';
  elements.forEach((el, idx) => {
    const item = document.createElement('div');
    item.className = 'layer-item' + (el === sel ? ' active' : '');

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'layer-thumb';
    if (el.classList.contains('flower')) {
      const src = el.querySelector('img')?.src;
      if (src) {
        const ti = document.createElement('img');
        ti.src = src; ti.alt = '';
        thumb.appendChild(ti);
      }
    } else {
      const t = document.createElement('span');
      t.className = 'layer-thumb-txt';
      t.textContent = 'T';
      t.style.color = el.style.color || 'var(--txt-mid)';
      thumb.appendChild(t);
    }

    // Name
    const name = document.createElement('div');
    name.className = 'layer-name';
    if (el.classList.contains('flower')) {
      name.textContent = el.querySelector('img')?.alt || '소재';
    } else {
      const txt = el.textContent.trim();
      name.textContent = txt.length > 11 ? txt.slice(0, 11) + '…' : txt;
    }

    // Up / Down buttons
    const btns = document.createElement('div');
    btns.className = 'layer-btns';

    const upBtn = document.createElement('button');
    upBtn.className = 'layer-btn'; upBtn.textContent = '▲'; upBtn.title = '앞으로';
    upBtn.disabled = idx === 0;
    upBtn.addEventListener('click', e => { e.stopPropagation(); moveLayer(el, 'up', elements); });

    const downBtn = document.createElement('button');
    downBtn.className = 'layer-btn'; downBtn.textContent = '▼'; downBtn.title = '뒤로';
    downBtn.disabled = idx === elements.length - 1;
    downBtn.addEventListener('click', e => { e.stopPropagation(); moveLayer(el, 'down', elements); });

    btns.appendChild(upBtn);
    btns.appendChild(downBtn);

    item.appendChild(thumb);
    item.appendChild(name);
    item.appendChild(btns);
    item.addEventListener('click', () => pick(el));

    list.appendChild(item);
  });
}

function moveLayer(el, dir, elements) {
  const idx = elements.indexOf(el);
  const other = dir === 'up' ? elements[idx - 1] : elements[idx + 1];
  if (!other) return;
  const z1 = +el.style.zIndex || 0;
  const z2 = +other.style.zIndex || 0;
  el.style.zIndex    = z2;
  other.style.zIndex = z1;
  renderLayers();
}

/* ── Delete / Reset ──────────────────────────────────── */
document.getElementById('del-btn').addEventListener('click', () => { if (!sel) return; sel.remove(); deselect(); renderLayers(); });
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('캔버스의 모든 소재와 텍스트를 삭제할까요?')) return;
  canvas.querySelectorAll('.cel').forEach(e => e.remove()); deselect(); renderLayers();
});

/* ── PNG Export ──────────────────────────────────────── */
function drawContain(ctx, imgEl, x, y, w, h) {
  const iw = imgEl.naturalWidth, ih = imgEl.naturalHeight;
  if (!iw || !ih) { ctx.drawImage(imgEl, x, y, w, h); return; }
  const s  = Math.min(w / iw, h / ih);
  const dw = iw * s, dh = ih * s;
  ctx.drawImage(imgEl, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
}
function drawContainCentered(ctx, imgEl, w, h) {
  const iw = imgEl.naturalWidth, ih = imgEl.naturalHeight;
  if (!iw || !ih) { ctx.drawImage(imgEl, -w/2, -h/2, w, h); return; }
  const s  = Math.min(w / iw, h / ih);
  const dw = iw * s, dh = ih * s;
  ctx.drawImage(imgEl, -dw / 2, -dh / 2, dw, dh);
}

document.getElementById('save-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-btn');
  btn.textContent = '저장 중…'; btn.disabled = true;
  const prevSel = sel; deselect();

  try {
    const W   = canvas.offsetWidth;
    const H   = canvas.offsetHeight;
    const DPR = 2;
    const off = document.createElement('canvas');
    off.width  = W * DPR; off.height = H * DPR;
    const ctx  = off.getContext('2d');
    ctx.scale(DPR, DPR);

    const bg = canvasBg || '#ffffff';
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const wreathEl = document.getElementById('wreath-base');
    drawContain(ctx, wreathEl, W * 0.04, H * 0.04, W * 0.92, H * 0.92);

    const elements = [...canvas.querySelectorAll('.cel')];
    elements.sort((a, b) => (+a.style.zIndex || 0) - (+b.style.zIndex || 0));

    for (const el of elements) {
      const left = parseFloat(el.style.left) || 0;
      const top  = parseFloat(el.style.top)  || 0;
      const w    = el.offsetWidth;
      const h    = el.offsetHeight;
      const cx   = left + w / 2;
      const cy   = top  + h / 2;
      const rot  = (parseFloat(el.dataset.rotate) || 0) * Math.PI / 180;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);

      if (el.classList.contains('flower')) {
        const imgEl = el.querySelector('img');
        if (imgEl) drawContainCentered(ctx, imgEl, w, h);
      } else if (el.classList.contains('txt')) {
        const fs   = el.style.fontSize   || '24px';
        const ff   = el.style.fontFamily || 'Pretendard, sans-serif';
        const col  = el.style.color      || '#000000';
        const lh   = parseFloat(fs) * 1.25;
        ctx.font         = `400 ${fs} ${ff}`;
        ctx.fillStyle    = col;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        const lines = el.textContent.split('\n');
        const totalH = (lines.length - 1) * lh;
        lines.forEach((line, i) => ctx.fillText(line, 0, i * lh - totalH / 2));
      }
      ctx.restore();
    }

    const fs = Math.round(W * 0.022);
    ctx.save();
    ctx.font = `600 ${fs}px Pretendard, sans-serif`;
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 6;
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('Wreath Lab', W - 14, H - 14);
    ctx.restore();

    const a = document.createElement('a');
    a.download = `wreath-lab-${Date.now()}.png`;
    a.href = off.toDataURL('image/png');
    a.click();

  } catch (err) {
    alert('저장 오류: ' + err.message);
  } finally {
    btn.textContent = 'PNG로 저장'; btn.disabled = false;
    if (prevSel && canvas.contains(prevSel)) pick(prevSel);
  }
});

/* ── Share ───────────────────────────────────────────── */
document.getElementById('share-btn').addEventListener('click', async () => {
  const url = window.location.href;
  try {
    if (navigator.share) { await navigator.share({ title: 'Wreath Lab', url }); }
    else { await navigator.clipboard.writeText(url); alert('링크가 클립보드에 복사되었습니다.'); }
  } catch { prompt('아래 링크를 복사하세요:', url); }
});

/* ── Right panel scroll hint ─────────────────────────── */
(function () {
  const rightPanel = document.getElementById('right');
  const hint = document.getElementById('scroll-hint');
  function update() {
    const scrollable = rightPanel.scrollHeight > rightPanel.clientHeight + 2;
    const atBottom = rightPanel.scrollTop + rightPanel.clientHeight >= rightPanel.scrollHeight - 6;
    hint.style.opacity = (scrollable && !atBottom) ? '1' : '0';
  }
  rightPanel.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  update();
})();
</script>
